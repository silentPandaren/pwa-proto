<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0a0a0a">
  <link rel="manifest" href="/manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Market">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <title>Cart — Market</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>

<header>
  <a href="/" class="header-logo">Market</a>
  <nav class="header-nav">
    <a href="/" class="nav-link">Home</a>
    <a href="#" class="nav-link">Games</a>
    <a href="#" class="nav-link">Library</a>
    <a href="#" class="nav-link">Market</a>
    <a href="#" class="nav-link">About</a>
  </nav>
  <div class="header-actions">
    <a href="/cart.html" id="cart-link">🛒 Cart <span id="cart-badge">0</span></a>
  </div>
</header>

<div class="cart-container">
  <h2 style="margin-bottom:1rem">Your Cart</h2>
  <div id="cart-items"></div>
</div>

<div id="toast"></div>

<script src="/js/cart.js"></script>
<script>
  function renderCart() {
    const cart = getCart();
    const container = document.getElementById('cart-items');

    if (cart.length === 0) {
      container.innerHTML = `
        <div class="empty-state">
          <div class="icon">🛒</div>
          <p>Your cart is empty.</p>
          <a href="/" class="btn-primary" style="margin-top:1rem">Browse products</a>
        </div>`;
      return;
    }

    const itemsHTML = cart.map((item) => `
      <div class="cart-item">
        <div class="cart-item-info">
          <span class="cart-item-name">${item.name}</span>
          <span class="cart-item-meta">$${item.price.toFixed(2)} × ${item.quantity}</span>
        </div>
        <div style="display:flex;align-items:center;gap:0.75rem">
          <strong>$${(item.price * item.quantity).toFixed(2)}</strong>
          <button
            onclick="removeFromCart('${item.id}'); renderCart();"
            style="background:none;border:none;cursor:pointer;font-size:1.1rem;color:#94a3b8"
            title="Remove"
          >✕</button>
        </div>
      </div>
    `).join('');

    const total = getCartTotal();

    container.innerHTML = itemsHTML + `
      <div class="cart-total">
        <span>Total</span>
        <span>$${total.toFixed(2)}</span>
      </div>
      <div style="display:flex;gap:0.75rem;margin-top:1rem">
        <button class="btn-primary" onclick="placeOrder()">Place Order</button>
        <button
          onclick="clearCart(); renderCart();"
          style="padding:0.75rem 1rem;border:1px solid var(--border);border-radius:0.5rem;background:white;cursor:pointer"
        >Clear Cart</button>
      </div>`;
  }

  function placeOrder() {
    clearCart();
    window.location.href = '/orders.html?new=1';
  }

  renderCart();
</script>
</body>
</html>

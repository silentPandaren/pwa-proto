<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0a0a0a">
  <title>Send Push — Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/styles.css">
  <style>
    .admin-wrap {
      max-width: 560px;
      margin: 48px auto;
      padding: 0 24px;
    }

    .admin-header {
      margin-bottom: 32px;
    }
    .admin-header h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 6px;
    }
    .admin-header p {
      font-size: 0.875rem;
      color: var(--text-muted);
    }

    .sub-count {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px 16px;
      margin-bottom: 28px;
      font-size: 0.875rem;
    }
    .sub-count strong {
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--primary);
    }

    .form-group {
      margin-bottom: 16px;
    }
    .form-group label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 6px;
    }
    .form-group input,
    .form-group textarea {
      width: 100%;
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 0.95rem;
      font-family: inherit;
      outline: none;
      transition: border-color 0.15s;
      resize: vertical;
    }
    .form-group input:focus,
    .form-group textarea:focus {
      border-color: var(--primary);
    }
    .form-group textarea {
      min-height: 90px;
    }

    .send-btn {
      width: 100%;
      height: 48px;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.15s, opacity 0.15s;
      margin-top: 8px;
    }
    .send-btn:hover { background: var(--primary-dark); }
    .send-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .result {
      margin-top: 20px;
      padding: 14px 16px;
      border-radius: 10px;
      font-size: 0.875rem;
      line-height: 1.5;
      display: none;
    }
    .result.success {
      background: rgba(81,172,23,0.12);
      border: 1px solid rgba(81,172,23,0.3);
      color: #7ed44a;
      display: block;
    }
    .result.error {
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.3);
      color: #f87171;
      display: block;
    }
  </style>
</head>
<body>

<header>
  <a href="/" class="header-logo">
    <img src="/images/showcase_logo.png" class="header-logo-img" alt="Market"
         onload="this.nextElementSibling.style.display='none'"
         onerror="this.style.display='none'">
    <span class="header-logo-text">Market</span>
  </a>
  <nav class="header-nav">
    <a href="/" class="nav-link">← Back to shop</a>
  </nav>
</header>

<div class="admin-wrap">
  <div class="admin-header">
    <h1>Send Push Notification</h1>
    <p>Message will be delivered to all subscribed users</p>
  </div>

  <div class="sub-count">
    <span>Subscribers:</span>
    <strong id="sub-count">—</strong>
  </div>

  <form id="push-form">
    <div class="form-group">
      <label>Title</label>
      <input type="text" id="push-title" placeholder="New item in the shop!" maxlength="80" required>
    </div>
    <div class="form-group">
      <label>Message</label>
      <textarea id="push-body" placeholder="Check out the latest offers — limited time only." maxlength="200" required></textarea>
    </div>
    <div class="form-group">
      <label>URL on click <span style="font-weight:400;text-transform:none;letter-spacing:0">(optional)</span></label>
      <input type="text" id="push-url" placeholder="/" value="/">
    </div>
    <button type="submit" class="send-btn" id="send-btn">Send to all subscribers</button>
  </form>

  <div class="result" id="result"></div>
</div>

<script>
  async function loadCount() {
    try {
      const res = await fetch('/subscribers');
      const { count } = await res.json();
      document.getElementById('sub-count').textContent = count;
    } catch {
      document.getElementById('sub-count').textContent = '?';
    }
  }

  document.getElementById('push-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('send-btn');
    const result = document.getElementById('result');

    const title = document.getElementById('push-title').value.trim();
    const body  = document.getElementById('push-body').value.trim();
    const url   = document.getElementById('push-url').value.trim() || '/';

    btn.disabled = true;
    btn.textContent = 'Sending…';
    result.className = 'result';
    result.style.display = 'none';

    try {
      const res = await fetch('/send-push', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ title, body, url })
      });
      const data = await res.json();

      if (!res.ok) throw new Error(data.error || 'Server error');

      result.className = 'result success';
      result.textContent = `✓ Sent to ${data.sent} subscriber${data.sent !== 1 ? 's' : ''}`;
      loadCount();
    } catch (err) {
      result.className = 'result error';
      result.textContent = `✗ ${err.message}`;
    } finally {
      btn.disabled = false;
      btn.textContent = 'Send to all subscribers';
    }
  });

  loadCount();
</script>

</body>
</html>
